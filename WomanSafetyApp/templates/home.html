<!DOCTYPE html>
<html>
<head>
    <title>Women Safety Navigation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">

    {% load static %}

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<div class="top-bar">
    <strong>Women Safety Navigation</strong>

    <div>
        👋 Welcome <b>{{ name }}</b>
        <a href="{% url 'logout' %}" class="btn btn-sm logout-btn">Logout</a>
    </div>
</div>

<div class="form-box">
    <button onclick="selectEnd()">Select Destination</button>
    <button onclick="cancelRoute()">Cancel Route</button>
    <button onclick="shareLiveLocation()">📍 Share Location</button>
    <button onclick="sendSOS()" style="background:red;">🚨 SOS</button> 
</div>

<div id="map"></div>

<!-- Django Data -->
<script>
    var unsafeZones = {{ zones|safe }};
</script>

<!-- JS Libraries -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<!-- Custom JS -->
<script src="{% static 'js/map.js' %}"></script>

</body>
</html>
